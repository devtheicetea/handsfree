name: Publish to npm

# Publishes the package whenever a version tag (v*) is pushed. Cut a release with:
#   npm version patch   # bumps package.json + commits + creates the matching tag
#   git push --follow-tags
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token for npm Trusted Publishing (no stored secret)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC) needs npm >= 11.5.1; Node 20 ships npm 10.
      - run: npm install -g npm@latest

      - run: npm ci

      - name: Tag must match package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG  package.json=$PKG"
          test "$TAG" = "$PKG" || { echo "::error::tag $GITHUB_REF_NAME does not match package.json version $PKG"; exit 1; }

      - run: npm test

      # Idempotent: if this version is already on the registry, skip publishing
      # (e.g. a tag re-created for consistency) instead of failing on a duplicate.
      - name: Check if version already published
        id: published
        run: |
          PKG="$(node -p "require('./package.json').version")"
          if npm view "handsfree-bridge@$PKG" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "handsfree-bridge@$PKG already on npm — skipping publish"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # No NODE_AUTH_TOKEN: npm authenticates via the OIDC id-token (Trusted
      # Publishing). prepublishOnly rebuilds dist/; provenance is attached automatically.
      - run: npm publish --access public
        if: steps.published.outputs.exists == 'false'
